version: '3.8'

services:
  php-apache:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: movieplex_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/apache.conf:/etc/apache2/sites-available/000-default.conf
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-movieflex_db}
      DB_USER: ${DB_USER:-movieplex_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - movieplex_net

  mysql:
    image: mysql:8.0
    container_name: movieplex_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-movieflex_db}
      MYSQL_USER: ${DB_USER:-movieplex_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - movieplex_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: movieplex_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    depends_on:
      - mysql
    networks:
      - movieplex_net

volumes:
  mysql_data:

networks:
  movieplex_net:
    driver: bridge